<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Win The Day</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1714;
    --surface: #232019;
    --surface-hover: #2c2820;
    --border: #3a3428;
    --text: #e8e0d4;
    --text-dim: #9a9080;
    --text-faint: #6a6258;
    --accent: #c8a44e;
    --accent-glow: #c8a44e33;
    --green: #5a9e6f;
    --green-bg: #5a9e6f18;
    --red: #b85c5c;
    --red-bg: #b85c5c15;
    --orange: #c4873b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 100px;
  }

  /* ── Header ── */
  .header { text-align: center; padding: 20px 0 28px; }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 4px;
  }

  .header .date {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 6px 14px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .streak-badge .fire { font-size: 1rem; }

  /* ── Score Display ── */
  .score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .score-panel.won {
    border-color: var(--accent);
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .score-panel.won::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center top, var(--accent-glow), transparent 70%);
    pointer-events: none;
  }

  .score-numbers {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    margin-bottom: 6px;
    position: relative;
  }

  .score-earned {
    font-family: 'DM Serif Display', serif;
    font-size: 3.2rem;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }

  .score-panel.won .score-earned { color: var(--accent); }

  .score-divider { font-size: 1.6rem; color: var(--text-faint); margin: 0 2px; }
  .score-total { font-size: 1.6rem; color: var(--text-dim); }

  .score-pct {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .progress-track {
    height: 8px;
    background: var(--bg);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--text-faint);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
    width: 0%;
  }

  .progress-fill.low { background: var(--red); }
  .progress-fill.mid { background: var(--orange); }
  .progress-fill.high { background: var(--green); }
  .progress-fill.won { background: var(--accent); }

  .win-status {
    text-align: center;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px;
    border-radius: 8px;
    position: relative;
  }

  .win-status.pending { color: var(--text-dim); background: transparent; }
  .win-status.losing { color: var(--red); background: var(--red-bg); }
  .win-status.won-day { color: var(--accent); background: var(--accent-glow); }

  .threshold-line { position: relative; height: 0; margin-top: -22px; margin-bottom: 22px; }
  .threshold-marker { position: absolute; top: -4px; width: 2px; height: 16px; background: var(--accent); opacity: 0.5; transform: translateX(-50%); }

  /* ── Group Sections ── */
  .group { margin-bottom: 20px; }

  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 4px 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .group-left { display: flex; align-items: center; gap: 8px; }

  .group-icon {
    font-size: 1rem;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .group-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .group-progress { font-size: 0.75rem; font-weight: 600; color: var(--text-faint); }
  .group-progress.complete { color: var(--green); }

  .group-items {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
  }

  .group.collapsed .group-items { max-height: 0 !important; opacity: 0; }

  .group-chevron { width: 18px; height: 18px; color: var(--text-faint); transition: transform 0.3s; }
  .group.collapsed .group-chevron { transform: rotate(-90deg); }

  /* ── Habit Items ── */
  .habit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }

  .habit-item:hover { background: var(--surface-hover); }
  .habit-item:active { transform: scale(0.985); }
  .habit-item.done { border-color: var(--green); background: var(--green-bg); }

  .habit-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }

  .habit-item.done .habit-check { border-color: var(--green); background: var(--green); }

  .habit-check svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.5); transition: all 0.2s; color: var(--bg); }
  .habit-item.done .habit-check svg { opacity: 1; transform: scale(1); }

  .habit-name { flex: 1; font-size: 0.9rem; font-weight: 500; color: var(--text); transition: opacity 0.2s; }
  .habit-item.done .habit-name { opacity: 0.5; }

  .habit-pts {
    font-size: 0.75rem; font-weight: 700; color: var(--text-faint);
    background: var(--bg); padding: 3px 9px; border-radius: 100px;
    letter-spacing: 0.03em; white-space: nowrap; flex-shrink: 0;
  }

  .habit-item.done .habit-pts { color: var(--green); background: transparent; }

  /* ── Notes ── */
  .notes-box {
    width: 100%; min-height: 80px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    color: var(--text); resize: vertical; outline: none; margin-bottom: 24px;
    transition: border-color 0.2s;
  }

  .notes-box::placeholder { color: var(--text-faint); }
  .notes-box:focus { border-color: var(--accent); }

  /* ── Actions ── */
  .actions { display: flex; gap: 10px; margin-bottom: 28px; }

  .btn {
    flex: 1; padding: 12px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.02em;
  }

  .btn:hover { background: var(--surface-hover); color: var(--text); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.9; }

  /* ── History Tabs ── */
  .history-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--surface); border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
  }

  .history-tab {
    flex: 1; padding: 8px 0; text-align: center;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-faint);
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
  }

  .history-tab:hover { color: var(--text-dim); }
  .history-tab.active { background: var(--bg); color: var(--accent); }

  /* ── Weekly ── */
  .day-labels {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin-bottom: 4px;
  }

  .day-label {
    text-align: center; font-size: 0.65rem; font-weight: 700;
    color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase;
  }

  .history-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin-bottom: 8px;
  }

  .history-day {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 600; border: 1px solid transparent;
  }

  .history-day.empty { background: var(--surface); opacity: 0.3; }
  .history-day.lost { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .history-day.won { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .history-day.today { border-color: var(--text-dim); color: var(--text-dim); background: var(--surface); }

  .history-day .day-num { font-size: 0.85rem; }
  .history-day .day-pct { font-size: 0.6rem; opacity: 0.8; }

  .history-label { text-align: center; font-size: 0.75rem; color: var(--text-faint); margin-bottom: 6px; }

  /* ── Monthly ── */
  .month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .month-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text); }

  .nav-btn {
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; transition: all 0.2s;
  }

  .nav-btn:hover { background: var(--surface-hover); color: var(--text); }
  .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 8px;
  }

  .month-day {
    aspect-ratio: 1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 600; border: 1px solid transparent;
  }

  .month-day.empty { opacity: 0; }
  .month-day.no-data { background: var(--surface); color: var(--text-faint); opacity: 0.4; }
  .month-day.future { opacity: 0.15; background: var(--surface); color: var(--text-faint); }
  .month-day.lost { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .month-day.won { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .month-day.today-ring { box-shadow: inset 0 0 0 2px var(--text-dim); color: var(--text); }

  .stats-row { display: flex; justify-content: center; gap: 24px; padding: 12px 0; }

  .stat-item { text-align: center; }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem; color: var(--text);
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }

  .stat-label {
    font-size: 0.65rem; font-weight: 700; color: var(--text-faint);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
  }

  /* ── Yearly ── */
  .year-months {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 12px;
  }

  .ym-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px;
  }

  .ym-name {
    font-size: 0.7rem; font-weight: 700; color: var(--text-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 6px; text-align: center;
  }

  .ym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

  .ym-dot { aspect-ratio: 1; border-radius: 2px; }
  .ym-dot.empty { opacity: 0; }
  .ym-dot.no-data { background: var(--border); opacity: 0.3; }
  .ym-dot.won { background: var(--accent); }
  .ym-dot.lost { background: var(--red); opacity: 0.5; }
  .ym-dot.future { background: var(--border); opacity: 0.1; }

  .ym-stats {
    display: flex; justify-content: center; gap: 4px;
    margin-top: 6px; font-size: 0.65rem; color: var(--text-faint);
  }

  .ym-stats .wc { color: var(--accent); font-weight: 700; }

  .section-label {
    font-size: 0.75rem; font-weight: 700; color: var(--text-faint);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 12px; padding-left: 4px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
    max-height: 85vh; overflow-y: auto; padding: 24px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; }

  .modal-close {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: var(--bg); color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  }

  .edit-group-label {
    font-size: 0.7rem; font-weight: 700; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin: 16px 0 8px 0; padding-top: 12px; border-top: 1px solid var(--border);
  }

  .edit-group-label:first-child { border-top: none; padding-top: 0; margin-top: 0; }

  .edit-item { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }

  .edit-item input[type="text"] {
    flex: 1; padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; outline: none;
  }

  .edit-item input[type="number"] {
    width: 54px; padding: 10px 6px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--accent); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; text-align: center; outline: none;
    -moz-appearance: textfield;
  }

  .edit-item input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .edit-item input:focus { border-color: var(--accent); }

  .edit-item select {
    padding: 10px 6px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; outline: none; cursor: pointer;
  }

  .edit-remove {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: var(--red-bg); color: var(--red); cursor: pointer;
    font-size: 1rem; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }

  .threshold-edit {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 0; border-top: 1px solid var(--border);
    margin-top: 12px; margin-bottom: 12px;
  }

  .threshold-edit label { font-size: 0.9rem; font-weight: 600; color: var(--text-dim); white-space: nowrap; }

  .threshold-edit input {
    width: 70px; padding: 10px 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--accent); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; text-align: center; outline: none;
  }

  .threshold-edit input:focus { border-color: var(--accent); }

  .add-habit-btn {
    width: 100%; padding: 12px; border: 2px dashed var(--border);
    border-radius: 10px; background: transparent; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; margin-bottom: 12px; transition: all 0.2s;
  }

  .add-habit-btn:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
    50% { box-shadow: 0 0 50px var(--accent-glow), 0 0 80px rgba(200, 164, 78, 0.1); }
  }

  .score-panel.won { animation: glow-pulse 3s ease-in-out infinite; }
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) {
    .app { padding: 16px 16px 100px; }
    .header h1 { font-size: 1.7rem; }
    .score-earned { font-size: 2.6rem; }
    .year-months { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="app">
  <div class="header">
    <h1>Win The Day</h1>
    <div class="date" id="dateDisplay"></div>
    <div class="streak-badge" id="streakBadge" style="display:none">
      <span class="fire">&#x1F525;</span>
      <span id="streakCount"></span>
    </div>
  </div>

  <div class="score-panel" id="scorePanel">
    <div class="score-numbers">
      <span class="score-earned" id="scoreEarned">0</span>
      <span class="score-divider">/</span>
      <span class="score-total" id="scoreTotal">0</span>
    </div>
    <div class="score-pct" id="scorePct">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="threshold-line">
      <div class="threshold-marker" id="thresholdMarker"></div>
    </div>
    <div class="win-status pending" id="winStatus">START YOUR DAY</div>
  </div>

  <div id="habitsContainer"></div>

  <div class="section-label" style="margin-top:8px">Daily Reflection</div>
  <textarea class="notes-box" id="notesBox" placeholder="How are you showing up today? Any wins, lessons, or thoughts..."></textarea>

  <div class="actions">
    <button class="btn" onclick="openEditModal()">Edit Habits</button>
    <button class="btn" onclick="resetDay()">Reset Day</button>
  </div>
  <div class="actions" style="margin-top:-18px">
    <button class="btn" onclick="exportBackup()">Export Backup</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">Import Backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
  </div>

  <div class="section-label">History</div>
  <div class="history-tabs">
    <button class="history-tab active" onclick="switchTab('week',this)">Week</button>
    <button class="history-tab" onclick="switchTab('month',this)">Month</button>
    <button class="history-tab" onclick="switchTab('year',this)">Year</button>
  </div>

  <div id="viewWeek">
    <div class="day-labels" id="dayLabels"></div>
    <div class="history-grid" id="historyGrid"></div>
    <div class="history-label" id="historyLabel"></div>
  </div>
  <div id="viewMonth" style="display:none"></div>
  <div id="viewYear" style="display:none"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Habits</span>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div id="editList"></div>
    <button class="add-habit-btn" onclick="addEditRow()">+ Add Habit</button>
    <div class="threshold-edit">
      <label>Win Threshold</label>
      <input type="number" id="thresholdInput" min="1" max="100" value="85">
      <span style="color:var(--text-dim);font-size:0.9rem">%</span>
    </div>
    <button class="btn primary" style="width:100%" onclick="saveEdits()">Save Changes</button>
  </div>
</div>

<script>
const GROUP_META = {
  morning: { icon: '☀️', label: 'Morning' },
  midday:  { icon: '⚡', label: 'Midday' },
  evening: { icon: '🥊', label: 'Evening' },
  allday:  { icon: '💧', label: 'All-Day Targets' },
  night:   { icon: '🌙', label: 'Night' }
};

const DEFAULT_HABITS = [
  { name: "Wake up — get right out of bed",   pts: 5,  group: "morning" },
  { name: "No phone for first hour",          pts: 10, group: "morning" },
  { name: "Pray",                             pts: 10, group: "morning" },
  { name: "Write in 5-minute journal",        pts: 10, group: "morning" },
  { name: "Read Bible",                       pts: 10, group: "morning" },
  { name: "Make bed",                         pts: 5,  group: "morning" },
  { name: "Drink water with lemon & salt",    pts: 5,  group: "morning" },
  { name: "Drink juice shot",                 pts: 5,  group: "morning" },
  { name: "Get sunlight + breathwork",        pts: 5,  group: "morning" },
  { name: "Read book",                        pts: 5,  group: "morning" },
  { name: "Phone on greyscale first 3 hrs",   pts: 5,  group: "morning" },
  { name: "Make latte, sit at desk",          pts: 5,  group: "morning" },
  { name: "Complete must-do list",            pts: 10, group: "midday" },
  { name: "30 min violin practice",           pts: 10, group: "midday" },
  { name: "30 min piano practice",            pts: 10, group: "midday" },
  { name: "Lift",                             pts: 15, group: "midday" },
  { name: "Muay Thai / BJJ",                 pts: 15, group: "evening" },
  { name: "Drink 1 gallon of water",         pts: 5,  group: "allday" },
  { name: "Adderall — 22.5mg (30mg no train)", pts: 5, group: "allday" },
  { name: "Hit protein / macro targets",     pts: 10, group: "allday" },
  { name: "Take creatine",                   pts: 5,  group: "allday" },
  { name: "Take fiber supplement",           pts: 5,  group: "allday" },
  { name: "7+ hours of sleep",               pts: 10, group: "allday" },
  { name: "Create tomorrow's must-do list",  pts: 5,  group: "night" },
  { name: "Did my actions align with my Identity?", pts: 15, group: "night" },
  { name: "Evening prayer",                  pts: 5,  group: "night" },
  { name: "Wind-down / screen cutoff",       pts: 5,  group: "night" },
];

const DEFAULT_THRESHOLD = 85;
const LS_KEY = 'wtd_data_v2';
const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const CHEVRON_SVG = '<svg class="group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

let collapsed = {};
let activeTab = 'week';
let monthOff = 0;
let yearOff = 0;
let state = loadState();

function dk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey() { return dk(new Date()); }
function groups() { return ['morning','midday','evening','allday','night']; }

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.date !== todayKey()) {
        if (!s.history) s.history = {};
        if (s.date && s.habits) {
          const e = s.habits.filter(h=>h.done).reduce((a,h)=>a+h.pts,0);
          const t = s.habits.reduce((a,h)=>a+h.pts,0);
          s.history[s.date] = { earned:e, total:t, pct: t?Math.round((e/t)*100):0 };
        }
        s.date = todayKey();
        s.habits.forEach(h=>h.done=false);
        s.notes = '';
        calcStreak(s);
      }
      if (s.collapsed) collapsed = s.collapsed;
      return s;
    }
  } catch(e) {}
  return { date:todayKey(), habits:DEFAULT_HABITS.map(h=>({...h,done:false})), threshold:DEFAULT_THRESHOLD, notes:'', history:{}, streak:0 };
}

function save() { state.collapsed = collapsed; localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function calcStreak(s) {
  let streak=0, d=new Date();
  d.setDate(d.getDate()-1);
  while(true) {
    const entry = s.history[dk(d)];
    if (entry && entry.pct >= (s.threshold||DEFAULT_THRESHOLD)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  s.streak = streak;
}

function pct() {
  const e = state.habits.filter(h=>h.done).reduce((a,h)=>a+h.pts,0);
  const t = state.habits.reduce((a,h)=>a+h.pts,0);
  return t ? Math.round((e/t)*100) : 0;
}

function render() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  const sb = document.getElementById('streakBadge');
  if (state.streak>0) { sb.style.display='inline-flex'; document.getElementById('streakCount').textContent=`${state.streak} day streak`; }
  else sb.style.display='none';

  const earned = state.habits.filter(h=>h.done).reduce((a,h)=>a+h.pts,0);
  const total = state.habits.reduce((a,h)=>a+h.pts,0);
  const p = total ? Math.round((earned/total)*100) : 0;
  const allDone = state.habits.every(h=>h.done);
  const isWin = p >= state.threshold;

  document.getElementById('scoreEarned').textContent = earned;
  document.getElementById('scoreTotal').textContent = total;
  document.getElementById('scorePct').textContent = p+'%';

  const fill = document.getElementById('progressFill');
  fill.style.width = p+'%';
  fill.className = 'progress-fill'+(isWin?' won':p>=60?' high':p>=30?' mid':p>0?' low':'');

  document.getElementById('scorePanel').className = 'score-panel'+(isWin?' won':'');
  document.getElementById('thresholdMarker').style.left = state.threshold+'%';

  const ws = document.getElementById('winStatus');
  const dc = state.habits.filter(h=>h.done).length;
  if (dc===0) { ws.className='win-status pending'; ws.textContent='START YOUR DAY'; }
  else if (isWin) { ws.className='win-status won-day'; ws.textContent=allDone?'✦ PERFECT DAY ✦':'✦ YOU WON THE DAY ✦'; }
  else { const need=Math.ceil((state.threshold/100)*total)-earned; ws.className='win-status losing'; ws.textContent=`${need} more pts to win`; }

  // Groups
  const c = document.getElementById('habitsContainer');
  c.innerHTML = '';
  groups().forEach(gk => {
    const habits = state.habits.map((h,i)=>({...h,index:i})).filter(h=>h.group===gk);
    if (!habits.length) return;
    const meta = GROUP_META[gk]||{icon:'📋',label:gk};
    const gd = habits.filter(h=>h.done).length;
    const gt = habits.length;
    const ic = collapsed[gk]||false;

    const g = document.createElement('div');
    g.className = 'group'+(ic?' collapsed':'');

    const hd = document.createElement('div');
    hd.className = 'group-header';
    hd.innerHTML = `<div class="group-left"><div class="group-icon">${meta.icon}</div><span class="group-title">${meta.label}</span></div><div style="display:flex;align-items:center;gap:10px"><span class="group-progress ${gd===gt?'complete':''}">${gd}/${gt}</span>${CHEVRON_SVG}</div>`;
    hd.addEventListener('click',()=>{ collapsed[gk]=!collapsed[gk]; save(); render(); });

    const it = document.createElement('div');
    it.className = 'group-items';
    if (!ic) it.style.maxHeight = (habits.length*56)+'px';

    habits.forEach(h => {
      const d = document.createElement('div');
      d.className = 'habit-item'+(h.done?' done':'');
      d.innerHTML = `<div class="habit-check">${CHECK_SVG}</div><span class="habit-name">${h.name}</span><span class="habit-pts">${h.done?'+':''}${h.pts}</span>`;
      d.addEventListener('click',()=>toggle(h.index));
      it.appendChild(d);
    });

    g.appendChild(hd); g.appendChild(it); c.appendChild(g);
  });

  document.getElementById('notesBox').value = state.notes||'';
  renderHist();
}

let justWon = false;
function toggle(i) {
  const was = pct() < state.threshold;
  state.habits[i].done = !state.habits[i].done;
  save();
  if (was && pct()>=state.threshold && !justWon) { justWon=true; confetti(); setTimeout(()=>{justWon=false},3000); }
  render();
}

function resetDay() {
  if (!confirm('Reset all habits for today?')) return;
  state.habits.forEach(h=>h.done=false);
  state.notes=''; collapsed={};
  save(); render();
}

document.getElementById('notesBox').addEventListener('input',function(){ state.notes=this.value; save(); });

// ── Tabs ──
function switchTab(t,btn) {
  activeTab=t;
  document.querySelectorAll('.history-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('viewWeek').style.display = t==='week'?'':'none';
  document.getElementById('viewMonth').style.display = t==='month'?'':'none';
  document.getElementById('viewYear').style.display = t==='year'?'':'none';
  renderHist();
}

function renderHist() {
  if (activeTab==='week') renderWeek();
  else if (activeTab==='month') renderMonth();
  else renderYear();
}

// ── Week ──
function renderWeek() {
  const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('dayLabels').innerHTML = names.map(n=>`<div class="day-label">${n}</div>`).join('');

  const grid = document.getElementById('historyGrid');
  grid.innerHTML = '';
  const today = new Date();
  let ww=0, wd=0;

  for (let i=0;i<7;i++) {
    const d = new Date(today); d.setDate(today.getDate()-today.getDay()+i);
    const key=dk(d), isT=key===todayKey(), entry=state.history[key];
    const el = document.createElement('div');
    if (isT) { el.className='history-day today'; el.innerHTML=`<span class="day-num">${d.getDate()}</span><span class="day-pct">${pct()}%</span>`; }
    else if (entry) { const w=entry.pct>=state.threshold; el.className='history-day '+(w?'won':'lost'); el.innerHTML=`<span class="day-num">${d.getDate()}</span><span class="day-pct">${entry.pct}%</span>`; wd++; if(w)ww++; }
    else { el.className='history-day empty'; el.innerHTML=`<span class="day-num">${d.getDate()}</span>`; }
    grid.appendChild(el);
  }
  document.getElementById('historyLabel').textContent = wd>0?`${ww}/${wd} days won this week`:'No history yet';
}

// ── Month ──
function renderMonth() {
  const el = document.getElementById('viewMonth');
  const today = new Date();
  const vd = new Date(today.getFullYear(), today.getMonth()+monthOff, 1);
  const yr=vd.getFullYear(), mo=vd.getMonth();
  const dim = new Date(yr,mo+1,0).getDate();
  const fdow = new Date(yr,mo,1).getDay();
  const mname = vd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const dn = ['S','M','T','W','T','F','S'];

  let wins=0, tracked=0, tpct=0;
  let h = `<div class="month-header"><button class="nav-btn" onclick="monthOff--;renderHist()">‹</button><span class="month-title">${mname}</span><button class="nav-btn${monthOff>=0?' disabled':''}" onclick="if(monthOff<0){monthOff++;renderHist()}">›</button></div>`;
  h += `<div class="month-grid">${dn.map(d=>`<div style="text-align:center;font-size:0.6rem;font-weight:700;color:var(--text-faint);letter-spacing:0.05em;padding:4px 0">${d}</div>`).join('')}`;

  for (let i=0;i<fdow;i++) h+='<div class="month-day empty"></div>';

  for (let d=1;d<=dim;d++) {
    const date=new Date(yr,mo,d), key=dk(date), isT=key===todayKey(), isFut=date>today&&!isT, entry=state.history[key];
    let cls='month-day';
    if (isFut) cls+=' future';
    else if (isT) { cls+=' today-ring'; if(pct()>=state.threshold) cls+=' won'; }
    else if (entry) { const w=entry.pct>=state.threshold; cls+=w?' won':' lost'; tracked++; tpct+=entry.pct; if(w)wins++; }
    else cls+=' no-data';
    h+=`<div class="${cls}">${d}</div>`;
  }

  const avg = tracked?Math.round(tpct/tracked):0;
  h+=`</div><div class="stats-row"><div class="stat-item"><div class="stat-value accent">${wins}</div><div class="stat-label">Days Won</div></div><div class="stat-item"><div class="stat-value">${tracked}</div><div class="stat-label">Tracked</div></div><div class="stat-item"><div class="stat-value green">${avg}%</div><div class="stat-label">Avg Score</div></div></div>`;
  el.innerHTML = h;
}

// ── Year ──
function renderYear() {
  const el = document.getElementById('viewYear');
  const today = new Date();
  const vy = today.getFullYear()+yearOff;
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let yw=0, yt=0, ytp=0;

  let h=`<div class="month-header"><button class="nav-btn" onclick="yearOff--;renderHist()">‹</button><span class="month-title">${vy}</span><button class="nav-btn${yearOff>=0?' disabled':''}" onclick="if(yearOff<0){yearOff++;renderHist()}">›</button></div><div class="year-months">`;

  for (let m=0;m<12;m++) {
    const dim=new Date(vy,m+1,0).getDate(), fd=new Date(vy,m,1).getDay();
    let mw=0, mt=0, mg='';
    for (let i=0;i<fd;i++) mg+='<div class="ym-dot empty"></div>';
    for (let d=1;d<=dim;d++) {
      const date=new Date(vy,m,d), key=dk(date), isT=key===todayKey(), isFut=date>today&&!isT, entry=state.history[key];
      let cls='ym-dot';
      if (isFut) cls+=' future';
      else if (isT) { cls+=pct()>=state.threshold?' won':' no-data'; }
      else if (entry) { const w=entry.pct>=state.threshold; cls+=w?' won':' lost'; mt++; yt++; ytp+=entry.pct; if(w){mw++;yw++;} }
      else cls+=' no-data';
      mg+=`<div class="${cls}"></div>`;
    }
    h+=`<div class="ym-card"><div class="ym-name">${mn[m]}</div><div class="ym-grid">${mg}</div><div class="ym-stats"><span class="wc">${mw}</span><span>/${mt||0}</span></div></div>`;
  }

  const ya = yt?Math.round(ytp/yt):0;
  h+=`</div><div class="stats-row"><div class="stat-item"><div class="stat-value accent">${yw}</div><div class="stat-label">Days Won</div></div><div class="stat-item"><div class="stat-value">${yt}</div><div class="stat-label">Tracked</div></div><div class="stat-item"><div class="stat-value green">${ya}%</div><div class="stat-label">Avg Score</div></div></div>`;
  el.innerHTML = h;
}

// ── Edit ──
function openEditModal() {
  const list=document.getElementById('editList'); list.innerHTML='';
  groups().forEach(gk => {
    const habits=state.habits.filter(h=>h.group===gk);
    if (!habits.length) return;
    const meta=GROUP_META[gk]||{label:gk};
    const lb=document.createElement('div'); lb.className='edit-group-label'; lb.textContent=meta.icon+'  '+meta.label;
    list.appendChild(lb);
    habits.forEach(h=>addEditRowWith(h.name,h.pts,h.group));
  });
  document.getElementById('thresholdInput').value=state.threshold;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
function addEditRow() { addEditRowWith('',10,'morning'); }

function addEditRowWith(name,pts,group) {
  const list=document.getElementById('editList'), div=document.createElement('div');
  div.className='edit-item';
  const opts = groups().map(g=>{const m=GROUP_META[g]||{label:g};return`<option value="${g}"${g===group?' selected':''}>${m.icon} ${m.label}</option>`;}).join('');
  div.innerHTML=`<input type="text" placeholder="Habit name" value="${name.replace(/"/g,'&quot;')}"><input type="number" min="1" max="100" value="${pts}"><select>${opts}</select><button class="edit-remove" onclick="this.parentElement.remove()">×</button>`;
  list.appendChild(div);
}

function saveEdits() {
  const items=document.querySelectorAll('#editList .edit-item'), nh=[];
  items.forEach(item=>{
    const name=item.querySelector('input[type="text"]').value.trim();
    const pts=parseInt(item.querySelector('input[type="number"]').value)||10;
    const group=item.querySelector('select').value;
    if(name){const ex=state.habits.find(h=>h.name===name&&h.group===group);nh.push({name,pts,group,done:ex?ex.done:false});}
  });
  if(!nh.length){alert('Add at least one habit!');return;}
  state.habits=nh;
  state.threshold=Math.max(1,Math.min(100,parseInt(document.getElementById('thresholdInput').value)||85));
  save(); closeEditModal(); render();
}

document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});

// ── Confetti ──
function confetti() {
  const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ps=[], cols=['#c8a44e','#e8d48c','#5a9e6f','#e8e0d4','#c4873b'];
  for(let i=0;i<80;i++) ps.push({x:cv.width/2+(Math.random()-.5)*200,y:cv.height*.4,vx:(Math.random()-.5)*12,vy:-Math.random()*14-4,sz:Math.random()*6+3,c:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*360,rs:(Math.random()-.5)*10,l:1});
  function anim(){ctx.clearRect(0,0,cv.width,cv.height);let alive=false;ps.forEach(p=>{if(p.l<=0)return;alive=true;p.x+=p.vx;p.vy+=.35;p.y+=p.vy;p.r+=p.rs;p.l-=.012;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.globalAlpha=p.l;ctx.fillStyle=p.c;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);ctx.restore();});if(alive)requestAnimationFrame(anim);else ctx.clearRect(0,0,cv.width,cv.height);}
  anim();
}

// ── Backup ──
function exportBackup() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `win-the-day-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.habits || !imported.date) {
        alert('Invalid backup file.');
        return;
      }
      if (!confirm('This will replace all current data (habits, history, streak) with the backup. Continue?')) return;
      state = imported;
      save();
      collapsed = state.collapsed || {};
      render();
      alert('Backup restored!');
    } catch(err) {
      alert('Could not read backup file. Make sure it is a valid Win The Day backup.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

render();
</script>
